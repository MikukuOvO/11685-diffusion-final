run_name: latent_cfg_official_vae_ema_cosine_h200_fast_192bs_150k
seed: 42
data_dir: ../imagenet100_128x128/train
output_dir: ../output/train_runs

image_size: 128
batch_size: 192
num_workers: 8
num_classes: 100

num_epochs: 20
max_train_steps: 150000
learning_rate: 0.0002
lr_scheduler: cosine
lr_warmup_steps: 5000
min_lr: 0.00001
weight_decay: 0.0001
grad_clip: 1.0
log_every: 100
mixed_precision: bf16
eval_num_images: 4

use_ema: true
ema_decay: 0.9999
ema_start_step: 2000
ema_update_every: 1

num_train_timesteps: 1000
num_inference_steps: 20
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear
variance_type: fixed_small
prediction_type: epsilon
clip_sample: true
clip_sample_range: 1.0

unet_in_size: 32
unet_in_ch: 3
unet_ch: 128
unet_num_res_blocks: 2
unet_ch_mult: [1, 2, 2, 4]
unet_attn: [2, 3]
unet_dropout: 0.0

latent_ddpm: true
vae_ckpt: pretrained/official_vae.ckpt
vae_scale_factor: 0.1912
vae_double_z: true
vae_z_channels: 3
vae_embed_dim: 3
vae_in_channels: 3
vae_out_ch: 3
vae_ch: 128
vae_ch_mult: [1, 2, 4]
vae_num_res_blocks: 2

use_cfg: true
cfg_guidance_scale: 3.0
cond_drop_rate: 0.1
use_ddim: true
