unet_ch_mult: [1, 2, 2, 4]
unet_attn: [2, 3]
unet_dropout: 0.0
latent_ddpm: true
vae_ckpt: ../output/vae_runs/vae_baseline_10k_bs16/checkpoints/checkpoint_epoch_1.pth
vae_scale_factor: 0.1845
vae_double_z: true
vae_z_channels: 3
vae_embed_dim: 3
vae_in_channels: 3
vae_out_ch: 3
vae_ch: 128
vae_ch_mult: [1, 2, 4]
vae_num_res_blocks: 2
use_cfg: true
cfg_guidance_scale: 2.0
cond_drop_rate: 0.1
use_ddim: true
