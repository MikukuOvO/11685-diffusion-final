run_name: latent_cfg_a100_40gb
seed: 42
data_dir: ../imagenet100_128x128/train
output_dir: ../output/train_runs
image_size: 128
batch_size: 64
num_workers: 8
num_classes: 100
num_epochs: 20
max_train_steps: 150000
