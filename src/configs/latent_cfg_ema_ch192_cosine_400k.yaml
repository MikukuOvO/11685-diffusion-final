run_name: latent_cfg_ema_ch192_cosine_400k
seed: 42
data_dir: ../imagenet100_128x128/train
output_dir: ../output/train_runs
image_size: 128
batch_size: 64
num_workers: 16
persistent_workers: true
prefetch_factor: 4
num_classes: 100
num_epochs: 20
max_train_steps: 400000
learning_rate: 0.0001
lr_scheduler: cosine
lr_warmup_steps: 5000
min_lr: 0.00001
weight_decay: 0.0001
grad_clip: 1.0
log_every: 100
num_train_timesteps: 1000
num_inference_steps: 100
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear

variance_type: fixed_small
prediction_type: epsilon
clip_sample: true
clip_sample_range: 1.0
unet_in_size: 32
unet_in_ch: 3
unet_ch: 192
unet_num_res_blocks: 2
unet_ch_mult: [1, 2, 2, 4]
unet_attn: [2, 3]
unet_dropout: 0.0

use_ema: true
ema_decay: 0.9999
ema_update_after_step: 100
ema_update_every: 1

latent_ddpm: true
vae_ckpt: ../output/vae_runs/vae_baseline_10k_bs16/checkpoints/checkpoint_epoch_1.pth
vae_scale_factor: 0.1845
vae_double_z: true
vae_z_channels: 3
vae_embed_dim: 3
vae_in_channels: 3
vae_out_ch: 3
vae_ch: 128
vae_ch_mult: [1, 2, 4]
vae_num_res_blocks: 2

use_cfg: true
cfg_guidance_scale: 2.0
cond_drop_rate: 0.05
use_ddim: true
